<!DOCTYPE html>
<html lang="tr" data-theme="{{ current_theme }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}AnketPro{% endblock %}</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'polls/style.css' %}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="navbar">
        <div class="nav-inner">
            <a href="{% url 'polls:index' %}" class="nav-brand">
                <span class="brand-icon">◆</span>
                <span>AnketPro</span>
            </a>
            
            <button class="nav-toggle" onclick="document.querySelector('.nav-links').classList.toggle('open')" aria-label="Menü">
                <span></span><span></span><span></span>
            </button>
            
            <div class="nav-links">
                {% if user.is_authenticated %}
                    <a href="{% url 'polls:index' %}" class="nav-link">Anketler</a>
                    <a href="{% url 'polls:profile' user.username %}" class="nav-link">
                        <span class="nav-avatar">{{ user.username|make_list|first|upper }}</span>
                        {{ user.username }}
                    </a>
                    <form action="{% url 'polls:logout' %}" method="post" style="display:inline;">
                        {% csrf_token %}
                        <button type="submit" class="nav-link logout-btn">Çıkış</button>
                    </form>
                {% else %}
                    <a href="{% url 'polls:login' %}" class="nav-link">Giriş Yap</a>
                    <a href="{% url 'polls:register' %}" class="nav-link nav-link--cta">Kayıt Ol</a>
                {% endif %}
            </div>
        </div>
    </nav>

    <main class="main">
        <div class="container">
            {% block content %}{% endblock %}
        </div>
    </main>

    <footer class="footer">
        <p>AnketPro &copy; 2026</p>
    </footer>
</body>
</html>
