<!DOCTYPE html>
<html lang="tr" data-theme="{{ current_theme }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}AnketPro{% endblock %}</title>
    {% load static %}
    <link rel="stylesheet" href="{% static 'polls/style.css' %}">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
        (function() {
            const savedTheme = localStorage.getItem('theme');
            const userTheme = "{{ current_theme }}";
            const theme = savedTheme || userTheme || 'beyaz';
            document.documentElement.setAttribute('data-theme', theme);
        })();
    </script>
</head>
<body>
    <nav class="navbar">
        <div class="nav-inner">
            <a href="{% url 'polls:index' %}" class="nav-brand">
                <img src="{% static 'polls/images/logo.png' %}" alt="AnketPro Logo" class="nav-logo">
                <span>AnketPro</span>
            </a>
            
            <button class="nav-toggle" onclick="document.querySelector('.nav-links').classList.toggle('open')" aria-label="Menü">
                <span></span><span></span><span></span>
            </button>

            <div class="nav-links">
                <button id="themeToggle" class="theme-toggle" aria-label="Temayı Değiştir">
                    <span class="moon-icon">🌙</span>
                    <span class="sun-icon">☀️</span>
                </button>
                {% if user.is_authenticated %}
                    <a href="{% url 'polls:index' %}" class="nav-link">Anketler</a>
                    <a href="{% url 'polls:profile' user.username %}" class="nav-link">
                        <span class="nav-avatar">{{ user.username|make_list|first|upper }}</span>
                        {{ user.username }}
                    </a>
                    <form action="{% url 'polls:logout' %}" method="post" style="display:inline;">
                        {% csrf_token %}
                        <button type="submit" class="nav-link logout-btn" aria-label="Çıkış Yap">
                            <span>Çıkış</span>
                            <svg class="logout-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                                <polyline points="16 17 21 12 16 7"></polyline>
                                <line x1="21" y1="12" x2="9" y2="12"></line>
                            </svg>
                        </button>
                    </form>
                {% else %}
                    <a href="{% url 'polls:login' %}" class="nav-link">Giriş Yap</a>
                    <a href="{% url 'polls:register' %}" class="nav-link nav-link--cta">Kayıt Ol</a>
                {% endif %}
            </div>
        </div>
    </nav>

    <main class="main">
        <div class="container">
            {% block content %}{% endblock %}
        </div>
    </main>

    <footer class="footer">
        <div class="container footer-content">
            <p>AnketPro &copy; 2026 <a href="{% url 'polls:changelog' %}" class="footer-version">v2.0</a></p>
            <div class="footer-divider"></div>
            <p class="footer-credits">
                <span>made with</span>
                <span class="heart-icon">❤</span>
                <span>by</span>
                <span class="author-name">aydın yiğit oğuz</span>
            </p>
        </div>
    </footer>

    <script>
        document.getElementById('themeToggle').addEventListener('click', () => {
            const html = document.documentElement;
            const themes = ['beyaz', 'siyah', 'mor'];
            const currentTheme = html.getAttribute('data-theme') || 'beyaz';
            const currentIndex = themes.indexOf(currentTheme);
            const nextIndex = (currentIndex + 1) % themes.length;
            const newTheme = themes[nextIndex];
            
            html.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
            
            // Sync with backend if logged in
            {% if user.is_authenticated %}
            fetch("{% url 'polls:edit_profile' %}", {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/x-www-form-urlencoded',
                    'X-CSRFToken': '{{ csrf_token }}'
                },
                body: `theme=${newTheme}&json=1`
            });
            {% endif %}
        });
    </script>
</body>
</html>
